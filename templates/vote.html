<!-- templates/vote.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vote Now</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            padding:50px;

            background:
            radial-gradient(circle at top left,#2563eb 0%,transparent 28%),
            radial-gradient(circle at bottom right,#7e22ce 0%,transparent 30%),
            #020617;

            color:white;
        }

        .title{

            text-align:center;

            margin-bottom:40px;
        }

        .title h1{

            font-size:55px;
            font-weight:800;
        }

        .title p{

            margin-top:12px;

            color:#cbd5e1;

            font-size:18px;
        }

        .vote-alert{

            width:100%;
            max-width:700px;

            margin:0 auto 30px auto;

            padding:18px;

            border-radius:18px;

            text-align:center;

            font-size:16px;
            font-weight:600;

            color:#fecaca;

            background:rgba(239,68,68,0.15);

            border:1px solid rgba(239,68,68,0.35);

            backdrop-filter:blur(12px);
        }

        .grid{

            display:grid;

            grid-template-columns:
            repeat(auto-fit,minmax(280px,1fr));

            gap:35px;

            max-width:1200px;

            margin:auto;
        }

        .card{

            background:
            linear-gradient(
                145deg,
                rgba(255,255,255,0.08),
                rgba(255,255,255,0.03)
            );

            border:1px solid rgba(255,255,255,0.08);

            border-radius:34px;

            overflow:hidden;

            backdrop-filter:blur(18px);

            transition:0.35s;

            box-shadow:
            0 0 40px rgba(0,0,0,0.3);
        }

        .card:hover{

            transform:
            translateY(-10px)
            scale(1.02);

            box-shadow:
            0 0 40px rgba(37,99,235,0.4);
        }

        .image{

            width:100%;
            height:260px;

            object-fit:cover;
        }

        .content{

            padding:28px;
        }

        .name{

            font-size:28px;
            font-weight:700;

            margin-bottom:20px;
        }

        button{

            width:100%;

            padding:16px;

            border:none;

            border-radius:18px;

            cursor:pointer;

            color:white;

            font-size:16px;
            font-weight:700;

            background:
            linear-gradient(
                90deg,
                #2563eb,
                #3b82f6
            );

            transition:0.3s;
        }

        button:hover{

            transform:translateY(-2px);

            box-shadow:
            0 0 25px rgba(37,99,235,0.45);
        }

    </style>

</head>

<body>

    <div class="title">

        <h1>Cast Your Vote</h1>

        <p>
            Select your preferred candidate securely.
        </p>

    </div>

    {% if error %}

    <div class="vote-alert">
        {{ error }}
    </div>

    {% endif %}

    <div class="grid">

        {% for c in candidates %}

        <form method="POST" class="card">

            <img
                src="{{ url_for('static', filename='uploads/' + c[1]) }}"
                class="image"
            >

            <div class="content">

                <div class="name">
                    {{ c[0] }}
                </div>

                <input
                    type="hidden"
                    name="candidate"
                    value="{{ c[0] }}"
                >

                <button type="submit">
                    Vote Now →
                </button>

            </div>

        </form>

        {% endfor %}

    </div>

</body>
</html>
