<!-- templates/register.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Secure Voting Registration</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            overflow:hidden;

            background:
            radial-gradient(circle at top left,#2563eb 0%,transparent 28%),
            radial-gradient(circle at bottom right,#7e22ce 0%,transparent 30%),
            #020617;

            color:white;
        }

        .card{

            width:430px;

            background:
            linear-gradient(
                145deg,
                rgba(255,255,255,0.08),
                rgba(255,255,255,0.03)
            );

            border:1px solid rgba(255,255,255,0.08);

            border-radius:34px;

            padding:38px;

            backdrop-filter:blur(18px);

            box-shadow:
            0 0 50px rgba(37,99,235,0.25);
        }

        .top{

            display:flex;
            justify-content:space-between;
            align-items:flex-start;

            margin-bottom:25px;
        }

        .logo{

            display:flex;
            gap:15px;
            align-items:flex-start;
        }

        .icon{

            width:52px;
            height:52px;

            border-radius:18px;

            background:
            linear-gradient(
                145deg,
                #2563eb,
                #7c3aed
            );

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:24px;
        }

        h1{

            font-size:22px;
            font-weight:700;

            line-height:1.2;
        }

        .sub{

            color:#cbd5e1;

            font-size:14px;

            margin-top:8px;
        }

        .live{

            padding:10px 16px;

            border-radius:16px;

            background:rgba(255,255,255,0.08);

            border:1px solid rgba(255,255,255,0.08);

            color:#22c55e;

            font-size:13px;
            font-weight:700;

            display:flex;
            align-items:center;
            gap:8px;
        }

        .dot{

            width:10px;
            height:10px;

            border-radius:50%;

            background:#22c55e;

            box-shadow:
            0 0 12px #22c55e;
        }

        label{

            display:block;

            margin-top:20px;
            margin-bottom:10px;

            font-size:15px;
            font-weight:600;
        }

        input{

            width:100%;

            padding:18px;

            border:none;
            outline:none;

            border-radius:18px;

            font-size:16px;

            background:#e2e8f0;
        }

        button{

            width:100%;

            margin-top:30px;

            padding:18px;

            border:none;

            border-radius:18px;

            font-size:17px;
            font-weight:700;

            color:white;

            cursor:pointer;

            background:
            linear-gradient(
                90deg,
                #2563eb,
                #3b82f6
            );

            transition:0.3s;
        }

        button:hover{

            transform:translateY(-2px);

            box-shadow:
            0 0 25px rgba(37,99,235,0.45);
        }

        .footer{

            text-align:center;

            margin-top:24px;

            color:#94a3b8;

            font-size:13px;
        }

        .offline{

            text-align:center;
        }

        .offline h2{

            font-size:42px;

            margin-top:40px;
        }

        .offline p{

            margin-top:15px;

            color:#cbd5e1;
        }

    </style>

</head>

<body>

{% if election_live %}

<form class="card" method="POST">

    <div class="top">

        <div class="logo">

            <div class="icon">🗳️</div>

            <div>

                <h1>Secure Voting<br>System</h1>

                <div class="sub">
                    Enter your details securely
                    to proceed for online voting.
                </div>

            </div>

        </div>

        <div class="live">
            <div class="dot"></div>
            LIVE ELECTION
        </div>

    </div>

    <label>Full Name</label>
    <input type="text" name="fullname" required>

    <label>Phone Number</label>
    <input type="text" name="phone" required>

    <label>Date of Birth</label>
    <input type="date" name="dob" required>

    <button type="submit">
        Proceed to Vote →
    </button>

    <div class="footer">
        Secure Voting System © 2026
    </div>

</form>

{% else %}

<div class="card offline">

    <h2>No Live Election</h2>

    <p>
        Online election is currently unavailable.
    </p>

</div>

{% endif %}

</body>
</html>
