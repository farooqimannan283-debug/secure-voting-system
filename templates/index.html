<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Secure Voting Registration</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            radial-gradient(circle at top left,#173b88 0%,transparent 30%),
            radial-gradient(circle at bottom right,#32105a 0%,transparent 30%),
            linear-gradient(135deg,#000428,#000814,#020024);

            overflow:hidden;

            position:relative;
        }

        body::before{

            content:"";

            position:absolute;

            width:700px;
            height:700px;

            background:rgba(0,119,255,0.08);

            filter:blur(120px);

            border-radius:50%;

            top:-200px;
            left:-200px;
        }

        body::after{

            content:"";

            position:absolute;

            width:700px;
            height:700px;

            background:rgba(128,0,255,0.08);

            filter:blur(120px);

            border-radius:50%;

            bottom:-200px;
            right:-200px;
        }

        .card{

            width:380px;

            padding:30px;

            border-radius:30px;

            background:rgba(7,12,40,0.75);

            border:1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(25px);

            box-shadow:
            0 0 50px rgba(0,119,255,0.15),
            inset 0 0 20px rgba(255,255,255,0.03);

            position:relative;

            z-index:10;
        }

        .top{

            display:flex;
            justify-content:space-between;
            align-items:flex-start;

            margin-bottom:30px;
        }

        .logo{

            display:flex;
            gap:12px;
            align-items:flex-start;
        }

        .icon{

            width:42px;
            height:42px;

            border-radius:14px;

            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(135deg,#5b5bff,#6d28d9);

            font-size:22px;

            box-shadow:0 0 20px rgba(91,91,255,0.4);
        }

        .title{

            color:white;
            font-size:17px;
            font-weight:700;
            line-height:1.2;
        }

        .subtitle{

            margin-top:10px;

            color:#9ca3af;

            font-size:13px;
            line-height:1.6;
        }

        .live{

            padding:10px 14px;

            border-radius:16px;

            background:rgba(255,255,255,0.05);

            border:1px solid rgba(255,255,255,0.06);

            color:white;

            font-size:12px;
            font-weight:700;

            text-align:center;

            display:flex;
            align-items:center;
            gap:8px;
        }

        .dot{

            width:10px;
            height:10px;

            border-radius:50%;

            background:#00ff66;

            box-shadow:0 0 12px #00ff66;
        }

        form{

            margin-top:20px;
        }

        .input-box{

            margin-bottom:22px;
        }

        label{

            display:block;

            margin-bottom:10px;

            color:white;

            font-size:15px;
            font-weight:600;
        }

        input{

            width:100%;

            padding:16px 18px;

            border:none;
            outline:none;

            border-radius:18px;

            background:#e5e7eb;

            font-size:16px;
            font-weight:500;

            transition:0.3s;
        }

        input:focus{

            transform:scale(1.02);

            box-shadow:0 0 20px rgba(59,130,246,0.4);
        }

        .btn{

            width:100%;

            padding:17px;

            border:none;

            border-radius:18px;

            background:linear-gradient(90deg,#2563eb,#3b82f6);

            color:white;

            font-size:16px;
            font-weight:700;

            cursor:pointer;

            transition:0.3s;

            box-shadow:0 10px 30px rgba(37,99,235,0.35);
        }

        .btn:hover{

            transform:translateY(-3px) scale(1.02);

            box-shadow:0 15px 40px rgba(37,99,235,0.45);
        }

        .footer{

            margin-top:22px;

            text-align:center;

            color:#6b7280;

            font-size:13px;
        }

        .offline{

            text-align:center;

            color:white;

            padding:20px 10px;
        }

        .offline h1{

            font-size:34px;

            margin-bottom:14px;
        }

        .offline p{

            color:#9ca3af;

            font-size:15px;
        }

        .vote-alert{

            width:100%;

            margin-bottom:20px;

            padding:16px;

            border-radius:16px;

            background:rgba(255,0,0,0.15);

            border:1px solid rgba(255,0,0,0.35);

            color:#fecaca;

            text-align:center;

            font-size:14px;
            font-weight:600;

            backdrop-filter:blur(10px);
        }

    </style>

</head>
<body>

<div class="card">

    {% if election_live %}

    <div class="top">

        <div>

            <div class="logo">

                <div class="icon">
                    🗳️
                </div>

                <div>

                    <div class="title">
                        Secure Voting<br>System
                    </div>

                    <div class="subtitle">
                        Enter your details securely<br>
                        to proceed for online voting.
                    </div>

                </div>

            </div>

        </div>

        <div class="live">

            <div class="dot"></div>

            LIVE<br>ELECTION

        </div>

    </div>

    <form method="POST">

        {% if error %}

        <div class="vote-alert">
            {{ error }}
        </div>

        {% endif %}

        <div class="input-box">

            <label>Full Name</label>

            <input
                type="text"
                name="fullname"
                placeholder="Enter your full name"
                required
            >

        </div>

        <div class="input-box">

            <label>Phone Number</label>

            <input
                type="text"
                name="phone"
                placeholder="Enter phone number"
                required
            >

        </div>

        <div class="input-box">

            <label>Date of Birth</label>

            <input
                type="date"
                name="dob"
                required
            >

        </div>

        <button class="btn" type="submit">
            Proceed to Vote →
        </button>

    </form>

    <div class="footer">
        Secure Voting System © 2026
    </div>

    {% else %}

    <div class="offline">

        <h1>No Live Election</h1>

        <p>
            Online election is currently unavailable.
        </p>

    </div>

    {% endif %}

</div>

</body>
</html>
