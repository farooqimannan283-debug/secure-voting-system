<!-- FILE NAME: templates/vote.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cast Your Vote</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:
    radial-gradient(circle at top left,#1d4ed8 0%,transparent 28%),
    radial-gradient(circle at bottom right,#581c87 0%,transparent 28%),
    #020617;

    position:relative;
}

/* BACKGROUND GLOW */

body::before{

    content:'';

    position:absolute;

    width:500px;
    height:500px;

    background:#2563eb;

    filter:blur(170px);

    opacity:0.16;

    top:-180px;
    left:-180px;
}

body::after{

    content:'';

    position:absolute;

    width:450px;
    height:450px;

    background:#7c3aed;

    filter:blur(170px);

    opacity:0.16;

    bottom:-180px;
    right:-180px;
}

/* MAIN CARD */

.vote-card{

    width:1100px;

    background:rgba(15,23,42,0.82);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:35px;

    padding:45px;

    backdrop-filter:blur(22px);

    box-shadow:
    0 0 40px rgba(37,99,235,0.22),
    0 25px 60px rgba(0,0,0,0.55);

    position:relative;

    z-index:5;

    animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* HEADER */

.top-section{

    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:35px;
}

.left{

    display:flex;
    align-items:center;
    gap:20px;
}

.logo{

    width:85px;
    height:85px;

    border-radius:25px;

    background:linear-gradient(135deg,#2563eb,#7c3aed);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:38px;

    color:white;

    box-shadow:0 0 25px rgba(59,130,246,0.45);
}

.left h1{

    color:white;

    font-size:42px;

    font-weight:800;
}

.left p{

    color:#94a3b8;

    margin-top:8px;
}

.live-box{

    display:flex;
    align-items:center;
    gap:10px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.08);

    padding:14px 22px;

    border-radius:16px;

    color:white;

    font-size:14px;

    font-weight:600;
}

.live-dot{

    width:12px;
    height:12px;

    border-radius:50%;

    background:#22c55e;

    box-shadow:0 0 14px #22c55e;

    animation:pulse 1.5s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.3);
    }

    100%{
        transform:scale(1);
    }
}

/* CANDIDATES GRID */

.candidate-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

    gap:25px;
}

/* CANDIDATE CARD */

.candidate-card{

    position:relative;

    background:rgba(255,255,255,0.04);

    border:2px solid rgba(255,255,255,0.06);

    border-radius:28px;

    padding:25px;

    text-align:center;

    transition:0.35s;

    cursor:pointer;

    overflow:hidden;
}

.candidate-card:hover{

    transform:translateY(-8px);

    border-color:#3b82f6;

    box-shadow:0 0 30px rgba(59,130,246,0.25);
}

.candidate-card input{

    display:none;
}

.candidate-card input:checked + .content{

    border-color:#3b82f6;
}

.content{

    border:2px solid transparent;

    border-radius:22px;

    padding:10px;

    transition:0.3s;
}

.candidate-image{

    width:120px;
    height:120px;

    border-radius:50%;

    object-fit:cover;

    border:4px solid rgba(255,255,255,0.08);

    margin-bottom:20px;

    background:#0f172a;
}

.candidate-name{

    color:white;

    font-size:24px;

    font-weight:700;

    margin-bottom:10px;
}

.vote-text{

    color:#94a3b8;

    font-size:14px;
}

/* RADIO CIRCLE */

.select-circle{

    width:26px;
    height:26px;

    border-radius:50%;

    border:3px solid #3b82f6;

    margin:18px auto 0;

    position:relative;
}

.candidate-card input:checked + .content .select-circle::after{

    content:'';

    width:12px;
    height:12px;

    border-radius:50%;

    background:#3b82f6;

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);
}

/* BUTTON */

.submit-btn{

    width:100%;

    margin-top:35px;

    border:none;

    padding:18px;

    border-radius:18px;

    background:linear-gradient(135deg,#2563eb,#06b6d4);

    color:white;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

    transition:0.3s;

    box-shadow:0 0 25px rgba(59,130,246,0.35);
}

.submit-btn:hover{

    transform:translateY(-3px);

    box-shadow:0 0 35px rgba(59,130,246,0.5);
}

/* FOOTER */

.footer{

    margin-top:28px;

    text-align:center;

    color:#64748b;

    font-size:14px;
}

/* RESPONSIVE */

@media(max-width:900px){

    .vote-card{

        width:95%;

        padding:30px 22px;
    }

    .top-section{

        flex-direction:column;
        align-items:flex-start;
        gap:20px;
    }

    .left h1{

        font-size:32px;
    }

}

</style>

</head>

<body>

<form method="POST" class="vote-card">

<div class="top-section">

<div class="left">

<div class="logo">
🗳️
</div>

<div>

<h1>Cast Your Vote</h1>

<p>
Secure Voting System Election Portal
</p>

</div>

</div>

<div class="live-box">

<div class="live-dot"></div>

LIVE ELECTION

</div>

</div>

<div class="candidate-grid">

{% for c in candidates %}

<label class="candidate-card">

<input 
type="radio" 
name="candidate" 
value="{{ c[0] }}" 
required>

<div class="content">

<img 
src="/static/uploads/{{ c[1] }}" 
class="candidate-image"
onerror="this.src='https://via.placeholder.com/120'">

<div class="candidate-name">
{{ c[0] }}
</div>

<div class="vote-text">
Click to cast your vote
</div>

<div class="select-circle"></div>

</div>

</label>

{% endfor %}

</div>

<button type="submit" class="submit-btn">
Submit Vote →
</button>

<div class="footer">
Secure Voting System © 2026
</div>

</form>

</body>

</html>
