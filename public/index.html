<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Voting Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#020617;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

body::before{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:#2563eb;
    filter:blur(180px);
    top:-150px;
    left:-150px;
    opacity:.4;
}

body::after{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:#7c3aed;
    filter:blur(180px);
    bottom:-200px;
    right:-150px;
    opacity:.3;
}

.card{
    width:420px;
    background:rgba(7,15,40,.75);
    border:1px solid rgba(255,255,255,.05);
    backdrop-filter:blur(18px);
    border-radius:32px;
    padding:32px;
    position:relative;
    z-index:1;
    box-shadow:0 0 40px rgba(37,99,235,.25);
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:25px;
}

.logo{
    display:flex;
    gap:15px;
}

.icon{
    width:52px;
    height:52px;
    border-radius:18px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
}

.title{
    font-size:24px;
    font-weight:800;
    line-height:1.2;
}

.subtitle{
    color:#94a3b8;
    margin-top:8px;
    font-size:15px;
}

.live{
    background:rgba(255,255,255,.05);
    padding:12px 16px;
    border-radius:16px;
    font-size:13px;
    font-weight:700;
}

.live-dot{
    width:10px;
    height:10px;
    background:#22c55e;
    border-radius:50%;
    display:inline-block;
    margin-right:8px;
    box-shadow:0 0 10px #22c55e;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
    margin-top:20px;
}

input{
    width:100%;
    padding:18px;
    border:none;
    outline:none;
    border-radius:18px;
    background:#e2e8f0;
    font-size:16px;
}

button{
    width:100%;
    margin-top:25px;
    padding:18px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#2563eb,#3b82f6);
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 0 25px rgba(37,99,235,.4);
}

button:hover{
    transform:translateY(-2px);
}

.footer{
    margin-top:28px;
    text-align:center;
    color:#64748b;
    font-size:14px;
}

.no-election{
    text-align:center;
    padding:30px 10px;
}

.no-election h2{
    font-size:28px;
    margin-bottom:15px;
}

.no-election p{
    color:#94a3b8;
}

</style>

</head>

<body>

<div class="card">

{% if election_live %}

<form method="POST">

    <div class="top">

        <div class="logo">

            <div class="icon">
                🗳️
            </div>

            <div>

                <div class="title">
                    Secure Voting<br>System
                </div>

                <div class="subtitle">
                    Enter your details securely to proceed for online voting.
                </div>

            </div>

        </div>

        <div class="live">
            <span class="live-dot"></span>
            LIVE ELECTION
        </div>

    </div>

    <label>Full Name</label>

    <input
        type="text"
        name="fullname"
        required
    >

    <label>Phone Number</label>

    <input
        type="text"
        name="phone"
        required
    >

    <label>Date of Birth</label>

    <input
        type="date"
        name="dob"
        required
    >

    <button type="submit">
        Proceed to Vote →
    </button>

    <div class="footer">
        Secure Voting System © 2026
    </div>

</form>

{% else %}

<div class="no-election">

    <h2>
        No Live Election
    </h2>

    <p>
        Online election is currently unavailable.
    </p>

</div>

{% endif %}

</div>

</body>
</html>
